apiVersion: apps/v1
kind: Deployment
metadata:
  name: dk-bridge-mcp
  namespace: mcp
  labels:
    app: dk-bridge-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dk-bridge-mcp
  template:
    metadata:
      labels:
        app: dk-bridge-mcp
    spec:
      containers:
        - name: mcp-server
          image: dk-bridge-mcp:latest
          imagePullPolicy: Never
          env:
            - name: MCP_TRANSPORT
              value: http
            - name: PORT
              value: "3847"
            - name: BRIDGE_STORE_PATH
              value: /data/bridge-tasks.json
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dk-bridge-mcp-secrets
                  key: MCP_API_KEY
          ports:
            - containerPort: 3847
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3847
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3847
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
